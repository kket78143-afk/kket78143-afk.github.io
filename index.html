   <script>
        // Наше "фейковое API" — просто массив с данными
        const fakeAPI = {
            facts: [
                "Коты спят 16 часов в день",
                "У кота 32 мышцы в каждом ухе",
                "Коты не чувствуют сладкий вкус",
                "Сердце кота бьётся 110-140 ударов в минуту",
                "Коты мурлыкают на частоте 25-150 Гц"
            ],
            getRandomFact: function() {
                const randomIndex = Math.floor(Math.random() * this.facts.length);
                return this.facts[randomIndex];
            }
        };

        function getFact() {
            const fact = fakeAPI.getRandomFact();

        getFact();
    </script>
<script>
    document.querySelectorAll('button[data-group]').forEach(button => {
        button.onclick = event => {
            const targetClass = event.currentTarget.dataset.group; // ".page"
            const targetId = event.currentTarget.dataset.target; // например, "page-1"
            document.querySelectorAll(targetClass).forEach(element => {
                element.classList.toggle('show', element.id === targetId);
            });
        };
    });
